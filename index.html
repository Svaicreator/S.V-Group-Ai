<!DOCTYPE html>
<html>
<head>
  <title>SV AI Chat</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #000; color: #fff; }
    h2 { color: #gold; }
    input { width: 300px; padding: 10px; border-radius: 8px; border: none; }
    button { padding: 10px 20px; background: #7b2ff7; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
    #answer { margin-top: 20px; background: #111; padding: 15px; border-radius: 10px; text-align: left; }
  </style>
</head>
<body>

<h2>SV AI Chat</h2>
<input id="question" placeholder="Ask AI...">
<button onclick="askAI()">Ask</button>
<p id="answer"></p>

<script>
async function askAI() {
  let question = document.getElementById("question").value;
  
  if (!question) {
    alert("Kuch toh poochho!");
    return;
  }

  document.getElementById("answer").innerText = "Thinking...";

  let response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer APKI_NAYI_KEY_YAHAN_DAALO"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: question }]
    })
  });

  let data = await response.json();
  document.getElementById("answer").innerText = data.choices[0].message.content;
}
</script>

</body>
</html>
